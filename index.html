<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Asistencia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{background:#0b1320;color:white;font-family:sans-serif;padding:20px}
input,textarea{width:100%;margin:5px 0;padding:10px;border-radius:8px;border:none}
button{padding:10px 20px;border-radius:8px;border:none;background:#16a34a;color:white;cursor:pointer}
.card{border:1px solid #1e293b;padding:15px;border-radius:12px;margin-bottom:15px}
</style>
</head>

<body>

<h1>Panel de Asistencia</h1>

<div class="card">
<h3>Configuración Supabase</h3>
<input id="url" placeholder="URL">
<input id="key" placeholder="API KEY">
<button onclick="config()">Guardar</button>
</div>

<div class="card">
<h3>Registro rápido</h3>
<input type="date" id="fecha">
<input id="nombre" placeholder="Nombre">
<button onclick="agregar()">Agregar</button>
<p id="status"></p>
</div>

<div class="card">
<h3>1ra. vez</h3>

<button onclick="restar()">-</button>
<span id="contador">0</span>
<button onclick="sumar()">+</button>

<input id="texto" placeholder="Texto libre">

<textarea id="nombres" placeholder="Nombres 1ra. vez (uno por línea)"></textarea>

</div>

<button onclick="guardar()">Guardar día</button>

<script>

let supabase;
let lista = [];
let contador = 0;

function config(){
 supabase = window.supabase.createClient(
  document.getElementById("url").value,
  document.getElementById("key").value
 );
 alert("Conectado");
}

function agregar(){
 const nombre = document.getElementById("nombre").value.toUpperCase();
 lista.push(nombre);
 document.getElementById("status").innerText="Hay cambios pendientes";
}

function sumar(){
 contador++;
 document.getElementById("contador").innerText=contador;
}

function restar(){
 if(contador>0)contador--;
 document.getElementById("contador").innerText=contador;
}

async function guardar(){

 const fecha = document.getElementById("fecha").value;

 const nombres = document.getElementById("nombres").value
  .split("\n")
  .map(x=>x.trim())
  .filter(x=>x);

 if(nombres.length>0){
   contador = nombres.length;
   document.getElementById("contador").innerText=contador;
 }

 for(const n of nombres){

   let {data} = await supabase
    .from("members")
    .select("*")
    .eq("name", n);

   let id;

   if(!data || data.length===0){
     let insert = await supabase
      .from("members")
      .insert([{name:n}])
      .select();
     id = insert.data[0].id;
   } else {
     id = data[0].id;
   }

   await supabase.from("first_time_tracking").insert([
     {member_id:id, first_date:fecha, returned:false}
   ]);
 }

 document.getElementById("status").innerText="";
 document.getElementById("nombres").value="";
 alert("Día guardado correctamente");
}

</script>

</body>
</html>
