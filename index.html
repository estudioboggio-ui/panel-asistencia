<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Panel San Martín V2 - Sistema Integral</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #f8fafc;
      --accent: #3b82f6;
      --line: #334155;
      --present: #10b981;
      --absent: #ef4444;
      --gold: #fcd34d;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 10px;
      line-height: 1.6;
      padding-bottom: 80px;
    }

    /* Utilitarios */
    .hidden { display: none !important; }
    .flex { display: flex; }
    .justify-between { justify-content: space-between; }
    .items-center { align-items: center; }
    
    header {
      padding: 1rem 0;
      border-bottom: 1px solid var(--line);
      margin-bottom: 1.5rem;
    }

    h1 { font-size: 1.4rem; color: var(--gold); }
    
    .panel {
      background: var(--panel);
      border-radius: var(--radius);
      padding: 1.2rem;
      margin-bottom: 1rem;
      border: 1px solid var(--line);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

    input, select, button {
      background: #0f172a;
      color: white;
      border: 1px solid var(--line);
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }

    .btn-primary { background: var(--accent); font-weight: 600; border: none; cursor: pointer; }
    .btn-secondary { background: #475569; border: none; cursor: pointer; }
    .btn-danger { background: var(--absent); border: none; cursor: pointer; }

    /* Buscador */
    .search-container { position: relative; margin-bottom: 1rem; }
    
    /* Lista de Personas */
    .list-container { max-height: 50vh; overflow-y: auto; }
    
    .person {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 8px;
      border-bottom: 1px solid var(--line);
    }
    
    .member-info { display: flex; flex-direction: column; }
    .member-name-link { 
      color: var(--gold); 
      font-weight: 600; 
      cursor: pointer; 
      text-decoration: none;
      font-size: 1.05rem;
    }
    .member-name-link:hover { text-decoration: underline; }
    
    .row-actions { display: flex; align-items: center; gap: 12px; }
    
    .badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
      transition: 0.3s;
    }
    .badge.on { background: var(--present); color: white; transform: scale(1.1); }

    .toggle-presence { 
      width: auto; 
      padding: 6px 14px; 
      font-size: 0.85rem; 
      background: #334155; 
    }
    .toggle-presence.is-present { background: var(--absent); }

    /* Barra Inferior */
    .save-bar {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      padding: 1rem;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border-top: 2px solid var(--accent);
      display: flex;
      gap: 10px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }
    .save-bar.visible { transform: translateY(0); }

    /* Modal de Ficha */
    #memberModal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 15px;
    }
    #memberModal.active { display: flex; }
    .modal-content { 
      width: 100%; 
      max-width: 550px; 
      max-height: 85vh; 
      overflow-y: auto; 
      position: relative;
    }
    .field-group { margin-bottom: 1.2rem; }

    /* Analíticas */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
    .stat-card { background: #0f172a; padding: 10px; border-radius: 8px; text-align: center; }
    .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.7rem; color: #94a3b8; }

    /* Tabs */
    .tabs { display: flex; gap: 5px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 10px; text-align: center; background: var(--panel); border-radius: 8px; cursor: pointer; border: 1px solid var(--line); font-size: 0.9rem; }
    .tab.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }
  </style>
</head>
<body>

  <header class="flex justify-between items-center">
    <div>
      <h1>San Martín V2</h1>
      <p id="connection-indicator" style="font-size: 0.7rem; color: #10b981;">● Online - Database Linked</p>
    </div>
    <button id="btnNewMember" style="width: auto; padding: 8px 15px; background: var(--present); border: none;">+ Nuevo</button>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="asistencia">Asistencia</div>
    <div class="tab" data-tab="miembros">Miembros</div>
    <div class="tab" data-tab="reportes">Reportes</div>
  </div>

  <!-- SECCIÓN ASISTENCIA -->
  <section id="tab-asistencia">
    <div class="panel grid-2">
      <div>
        <label>Fecha del Encuentro</label>
        <input type="date" id="datePicker">
      </div>
      <div>
        <label>Turno</label>
        <select id="shiftPicker">
          <option value="Mañana">Mañana</option>
          <option value="Tarde">Tarde</option>
          <option value="Noche">Noche</option>
        </select>
      </div>
    </div>

    <div class="panel">
      <div class="search-container">
        <input type="text" id="search" placeholder="Filtrar por nombre...">
      </div>
      <div id="searchEmptyState" class="hidden" style="text-align: center; padding: 2rem; color: #94a3b8;">
        Sin resultados.
      </div>
      <div id="peopleList" class="list-container">
        <!-- Render dinámico -->
      </div>
    </div>
  </section>

  <!-- SECCIÓN REPORTES (Resumen rápido) -->
  <section id="tab-reportes" class="hidden">
    <div class="panel">
      <h3>Resumen de Asistencia</h3>
      <div class="stats-grid">
        <div class="stat-card">
          <div id="stat-presentes" class="stat-val">0</div>
          <div class="stat-label">Presentes</div>
        </div>
        <div class="stat-card">
          <div id="stat-total" class="stat-val">0</div>
          <div class="stat-label">Total Activos</div>
        </div>
      </div>
      <canvas id="attendanceChart" style="margin-top: 20px; max-height: 200px;"></canvas>
    </div>
  </section>

  <!-- BARRA DE GUARDADO DINÁMICA -->
  <div id="saveBar" class="save-bar">
    <button id="btnSaveDay" class="btn-primary">💾 Guardar Cambios</button>
    <button id="btnDiscard" class="btn-secondary">Descartar</button>
  </div>

  <!-- MODAL DE FICHA / EDICIÓN -->
  <div id="memberModal">
    <div class="panel modal-content">
      <h2 id="modalTitle" style="color: var(--gold); margin-bottom: 1.5rem;">Ficha de Miembro</h2>
      <input type="hidden" id="editId">
      
      <div class="field-group">
        <label>Nombre y Apellido</label>
        <input type="text" id="editNombre" placeholder="Ej: JUAN PEREZ">
      </div>
      
      <div class="grid-2">
        <div class="field-group">
          <label>Teléfono</label>
          <input type="tel" id="editTelefono" placeholder="11...">
        </div>
        <div class="field-group">
          <label>Estado</label>
          <select id="editEstado">
            <option value="ACTIVO">ACTIVO</option>
            <option value="INACTIVO">INACTIVO</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Dirección</label>
        <input type="text" id="editDireccion">
      </div>

      <div class="grid-2">
        <div class="field-group">
          <label>F. Nacimiento</label>
          <input type="date" id="editNacimiento">
        </div>
        <div class="field-group">
          <label>F. Ingreso</label>
          <input type="date" id="editIngreso">
        </div>
      </div>

      <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 10px;">
        <button id="btnModalSave" class="btn-primary">Guardar Miembro</button>
        <button id="btnModalCancel" class="btn-secondary">Cancelar</button>
        <button id="btnDeleteMember" class="btn-danger" style="margin-top: 10px; font-size: 0.8rem; opacity: 0.7;">Eliminar Miembro</button>
      </div>
    </div>
  </div>

  <script>
    // --- CONFIGURACIÓN ---
    const SB_URL = 'TU_SUPABASE_URL';
    const SB_KEY = 'TU_SUPABASE_ANON_KEY';
    const supabase = lib.supabase.createClient(SB_URL, SB_KEY);

    const $ = id => document.getElementById(id);
    const escapeHtml = str => str ? str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#039;"}[m])) : '';

    // --- ESTADO GLOBAL ---
    let state = {
      members: [],       // Objetos completos de la DB
      attendance: {},    // { "2023-10-25": { "Mañana": ["Nombre A", "Nombre B"] } }
      isDirty: false,
      currentTab: 'asistencia'
    };

    // --- INICIO ---
    window.onload = async () => {
      $("datePicker").valueAsDate = new Date();
      await initData();
      attachEventListeners();
    };

    async function initData() {
      try {
        // Cargar Miembros
        const { data: mData, error: mErr } = await supabase.from('members').select('*').order('nombre', { ascending: true });
        if (mErr) throw mErr;
        state.members = mData;

        // Cargar Historial de Asistencia (Últimos 30 días para reportes)
        const { data: aData, error: aErr } = await supabase.from('attendance').select('*');
        if (aErr) throw aErr;
        
        aData.forEach(row => {
          if (!state.attendance[row.fecha]) state.attendance[row.fecha] = {};
          state.attendance[row.fecha][row.turno] = row.presentes || [];
        });

        renderPeople();
        updateStats();
      } catch (err) {
        console.error("Error inicializando:", err);
        alert("Error de conexión con Supabase.");
      }
    }

    // --- RENDERIZADO ---
    function renderPeople() {
      const date = $("datePicker").value;
      const shift = $("shiftPicker").value;
      const query = $("search").value.trim().toLowerCase();
      
      // Filtrar activos (y que coincidan con búsqueda)
      let list = state.members.filter(m => m.estado === 'ACTIVO');
      if (query) list = list.filter(m => m.nombre.toLowerCase().includes(query));

      const presentesHoy = state.attendance[date]?.[shift] || [];

      $("peopleList").innerHTML = list.map(m => {
        const isPresent = presentesHoy.includes(m.nombre);
        return `
          <div class="person" data-id="${m.id}">
            <div class="member-info">
              <span class="member-name-link" onclick="abrirFicha('${m.id}')">${escapeHtml(m.nombre)}</span>
            </div>
            <div class="row-actions">
              <div class="badge ${isPresent ? 'on' : ''}">${isPresent ? 'P' : '-'}</div>
              <button class="toggle-presence ${isPresent ? 'is-present' : ''}" 
                      onclick="toggleAsistencia('${m.nombre}')">
                ${isPresent ? 'Quitar' : 'Marcar'}
              </button>
            </div>
          </div>
        `;
      }).join('');
      
      $("searchEmptyState").classList.toggle('hidden', list.length > 0);
      updateStats();
    }

    // --- LÓGICA DE ASISTENCIA ---
    function toggleAsistencia(nombre) {
      const date = $("datePicker").value;
      const shift = $("shiftPicker").value;

      if (!state.attendance[date]) state.attendance[date] = {};
      if (!state.attendance[date][shift]) state.attendance[date][shift] = [];

      let presentes = state.attendance[date][shift];
      if (presentes.includes(nombre)) {
        state.attendance[date][shift] = presentes.filter(n => n !== nombre);
      } else {
        state.attendance[date][shift].push(nombre);
      }

      state.isDirty = true;
      $("saveBar").classList.add("visible");
      renderPeople();
    }

    async function guardarDia() {
      const date = $("datePicker").value;
      const shift = $("shiftPicker").value;
      const presentes = state.attendance[date]?.[shift] || [];

      const { error } = await supabase.from('attendance').upsert({
        fecha: date,
        turno: shift,
        presentes: presentes,
        updated_at: new Date()
      }, { onConflict: 'fecha,turno' });

      if (error) {
        alert("Error al guardar: " + error.message);
      } else {
        state.isDirty = false;
        $("saveBar").classList.remove("visible");
        alert("Día guardado correctamente.");
      }
    }

    // --- GESTIÓN DE MIEMBROS (FICHA) ---
    function abrirFicha(id) {
      const m = id ? state.members.find(x => String(x.id) === String(id)) : null;
      
      $("editId").value = m ? m.id : '';
      $("editNombre").value = m ? m.nombre : '';
      $("editTelefono").value = m ? m.telefono || '' : '';
      $("editDireccion").value = m ? m.direccion || '' : '';
      $("editNacimiento").value = m ? m.fecha_nacimiento || '' : '';
      $("editIngreso").value = m ? m.fecha_ingreso || '' : '';
      $("editEstado").value = m ? m.estado : 'ACTIVO';
      
      $("modalTitle").innerText = m ? 'Editar Miembro' : 'Nuevo Miembro';
      $("btnDeleteMember").classList.toggle('hidden', !m);
      $("memberModal").classList.add("active");
    }

    async function salvarMiembro() {
      const id = $("editId").value;
      const payload = {
        nombre: $("editNombre").value.trim().toUpperCase(),
        telefono: $("editTelefono").value.trim(),
        direccion: $("editDireccion").value.trim(),
        fecha_nacimiento: $("editNacimiento").value || null,
        fecha_ingreso: $("editIngreso").value || null,
        estado: $("editEstado").value
      };

      if (!payload.nombre) return alert("El nombre es obligatorio");

      let error;
      if (id) {
        const res = await supabase.from('members').update(payload).eq('id', id);
        error = res.error;
      } else {
        const res = await supabase.from('members').insert([payload]);
        error = res.error;
      }

      if (error) alert("Error: " + error.message);
      else {
        $("memberModal").classList.remove("active");
        await initData();
      }
    }

    async function eliminarMiembro() {
      if (!confirm("¿Seguro que querés eliminar a este miembro? Esta acción no se puede deshacer.")) return;
      const id = $("editId").value;
      const { error } = await supabase.from('members').delete().eq('id', id);
      if (error) alert(error.message);
      else {
        $("memberModal").classList.remove("active");
        await initData();
      }
    }

    // --- UI & EVENTOS ---
    function attachEventListeners() {
      $("datePicker").onchange = renderPeople;
      $("shiftPicker").onchange = renderPeople;
      $("search").oninput = renderPeople;
      $("btnSaveDay").onclick = guardarDia;
      $("btnDiscard").onclick = () => { if(confirm("¿Descartar cambios?")) location.reload(); };
      $("btnNewMember").onclick = () => abrirFicha(null);
      $("btnModalCancel").onclick = () => $("memberModal").classList.remove("active");
      $("btnModalSave").onclick = salvarMiembro;
      $("btnDeleteMember").onclick = eliminarMiembro;

      // Navegación Tabs
      document.querySelectorAll(".tab").forEach(t => {
        t.onclick = () => {
          document.querySelectorAll(".tab, section").forEach(el => el.classList.remove('active', 'hidden'));
          t.classList.add('active');
          const target = t.dataset.tab;
          
          if(target === 'asistencia') {
            $("tab-asistencia").classList.remove('hidden');
            $("tab-reportes").classList.add('hidden');
          } else if(target === 'reportes') {
            $("tab-asistencia").classList.add('hidden');
            $("tab-reportes").classList.remove('hidden');
            renderChart();
          }
          // Nota: La tab "Miembros" aquí simplemente filtra la lista principal o podrías expandirla.
        };
      });
    }

    function updateStats() {
      const date = $("datePicker").value;
      const shift = $("shiftPicker").value;
      const presentes = state.attendance[date]?.[shift]?.length || 0;
      const total = state.members.filter(m => m.estado === 'ACTIVO').length;
      
      $("stat-presentes").innerText = presentes;
      $("stat-total").innerText = total;
    }

    // --- GRÁFICO (Opcional pero potente) ---
    let myChart = null;
    function renderChart() {
      const ctx = $("attendanceChart").getContext('2d');
      if (myChart) myChart.destroy();

      const dates = Object.keys(state.attendance).sort().slice(-7); // Últimos 7 días
      const data = dates.map(d => {
        const shifts = state.attendance[d];
        // Sumar todos los turnos del día (o elegir uno)
        return Object.values(shifts).reduce((acc, curr) => acc + curr.length, 0);
      });

      myChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: dates,
          datasets: [{
            label: 'Asistencia Total por Día',
            data: data,
            borderColor: '#3b82f6',
            tension: 0.3,
            fill: true,
            backgroundColor: 'rgba(59, 130, 246, 0.1)'
          }]
        },
        options: {
          scales: { y: { beginAtZero: true, grid: { color: '#334155' } }, x: { grid: { display: false } } },
          plugins: { legend: { display: false } }
        }
      });
    }

  </script>
</body>
</html>
